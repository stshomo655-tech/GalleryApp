<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            font-size: 24px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal img {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 600px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    My Gallery Website 🎉
</header>

<div class="gallery">
    <img src="https://picsum.photos/300/200?1" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?2" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?3" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?4" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?5" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?6" onclick="openModal(this.src)">
</div>

<!-- Modal -->
<div id="myModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg">
</div>

<script>
    function openModal(src) {
        document.getElementById("myModal").style.display = "block";
        document.getElementById("modalImg").src = src;
    }

    function closeModal() {
        document.getElementById("myModal").style.display = "none";
    }
</script>

</body>
</html>
